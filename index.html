<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#160f14" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Nutrition" />
    <title>Nutrition Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Hanken+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="app">
      <main id="screen"><!-- active screen renders here --></main>

      <nav id="nav">
        <button class="nav-btn" data-screen="today" aria-label="Today">
          <span class="nav-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <line x1="3" y1="21" x2="21" y2="21" />
              <rect x="5" y="11" width="3" height="8" rx="1" />
              <rect x="10.5" y="5" width="3" height="14" rx="1" />
              <rect x="16" y="14" width="3" height="5" rx="1" />
            </svg>
          </span>
          <span class="nav-label">Today</span>
        </button>
        <button class="nav-btn" data-screen="scan" aria-label="Scan">
          <span class="nav-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 8V6a3 3 0 0 1 3-3h2" />
              <path d="M16 3h2a3 3 0 0 1 3 3v2" />
              <path d="M21 16v2a3 3 0 0 1-3 3h-2" />
              <path d="M8 21H6a3 3 0 0 1-3-3v-2" />
              <line x1="3" y1="12" x2="21" y2="12" />
            </svg>
          </span>
          <span class="nav-label">Scan</span>
        </button>
        <button class="nav-btn" data-screen="search" aria-label="Search">
          <span class="nav-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="7" />
              <line x1="16.5" y1="16.5" x2="21" y2="21" />
            </svg>
          </span>
          <span class="nav-label">Search</span>
        </button>
        <button class="nav-btn" data-screen="history" aria-label="History">
          <span class="nav-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="9" />
              <path d="M12 7v5l3.2 2" />
            </svg>
          </span>
          <span class="nav-label">History</span>
        </button>
        <button class="nav-btn" data-screen="profile" aria-label="Profile">
          <span class="nav-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="8.5" r="4" />
              <path d="M4.5 20.5a7.5 7.5 0 0 1 15 0" />
            </svg>
          </span>
          <span class="nav-label">Profile</span>
        </button>
      </nav>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
