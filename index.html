<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#16a34a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Nutrition" />
    <title>Nutrition Tracker</title>
  </head>
  <body>
    <div id="app">
      <main id="screen"><!-- active screen renders here --></main>

      <nav id="nav">
        <button class="nav-btn" data-screen="today" aria-label="Today">
          <span class="nav-icon">📊</span><span class="nav-label">Today</span>
        </button>
        <button class="nav-btn" data-screen="scan" aria-label="Scan">
          <span class="nav-icon">📷</span><span class="nav-label">Scan</span>
        </button>
        <button class="nav-btn" data-screen="history" aria-label="History">
          <span class="nav-icon">🗓️</span><span class="nav-label">History</span>
        </button>
        <button class="nav-btn" data-screen="profile" aria-label="Profile">
          <span class="nav-icon">⚙️</span><span class="nav-label">Profile</span>
        </button>
      </nav>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
